<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Score Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #4f8cff; --accent2: #a259ff; --text: #e8e8f0;
    --muted: #555570; --green: #22d98a; --red: #ff5f7e; --yellow: #ffd166;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(79,140,255,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(162,89,255,0.06) 0%, transparent 60%);
  }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 36px 32px; width: 100%; max-width: 500px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 24px; }

  /* Top-level split */
  .split-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    background: rgba(79,140,255,0.05); border: 1px solid rgba(79,140,255,0.15);
    border-radius: 12px; padding: 12px 14px;
  }
  .split-label { font-size: 12px; font-weight: 700; color: var(--muted); flex: 1; }
  .split-item { display: flex; align-items: center; gap: 6px; }
  .split-name { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .split-input {
    width: 52px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 13px; padding: 5px 8px; outline: none; text-align: center;
    transition: border-color 0.2s; -moz-appearance: textfield;
  }
  .split-input:focus { border-color: var(--accent); }
  .split-pct { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
  .split-warn { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--red); margin-left: 6px; display: none; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  .col-headers { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .ch { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; }

  .inputs-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .input-row { display: flex; align-items: center; gap: 8px; }

  .input-tag { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); width: 52px; flex-shrink: 0; }
  .slash { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 16px; flex-shrink: 0; }
  .x-sym { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; flex-shrink: 0; }
  .pct-display { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); width: 46px; text-align: right; flex-shrink: 0; }

  input[type="number"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px;
    padding: 9px 8px; outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield; min-width: 0; text-align: center;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }

  .weight-input {
    width: 52px; flex: unset !important;
    background: rgba(162,89,255,0.08) !important;
    border-color: rgba(162,89,255,0.25) !important;
    color: var(--accent2) !important;
  }
  .weight-input:focus { border-color: var(--accent2) !important; }

  .weight-warn { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--red); margin-top: 2px; display: none; text-align: right; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .target-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .target-label { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .target-input { width: 80px; flex: unset !important; }

  .calc-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .calc-btn:hover { opacity: 0.9; }
  .calc-btn:active { transform: scale(0.98); }

  .result {
    margin-top: 20px; border-radius: 14px; padding: 20px; display: none;
    border: 1px solid; animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .result.good { background: rgba(34,217,138,0.07); border-color: rgba(34,217,138,0.25); }
  .result.warn  { background: rgba(255,209,102,0.07); border-color: rgba(255,209,102,0.25); }
  .result.bad   { background: rgba(255,95,126,0.07);  border-color: rgba(255,95,126,0.25); }
  .result-score { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .result.good .result-score { color: var(--green); }
  .result.warn .result-score { color: var(--yellow); }
  .result.bad  .result-score { color: var(--red); }
  .result-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .result-note { margin-top: 10px; font-size: 13px; font-weight: 600; }
  .result.good .result-note { color: var(--green); }
  .result.warn .result-note { color: var(--yellow); }
  .result.bad  .result-note { color: var(--red); }
  .breakdown {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
    display: flex; flex-direction: column; gap: 4px;
  }
  .breakdown span { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="title">Exam Calculator</div>
  <div class="subtitle">ALL WEIGHTS EDITABLE</div>

  <!-- Top-level split -->
  <div class="split-row">
    <div class="split-label">Overall split</div>
    <div class="split-item">
      <div class="split-name">Assess.</div>
      <input type="number" class="split-input" id="w_assess" value="40" min="0" max="100" oninput="syncSplit('assess')">
      <div class="split-pct">%</div>
    </div>
    <div class="split-item" style="margin-left:10px">
      <div class="split-name">Exam</div>
      <input type="number" class="split-input" id="w_exam" value="60" min="0" max="100" oninput="syncSplit('exam')">
      <div class="split-pct">%</div>
    </div>
    <div class="split-warn" id="split_warn">must = 100%</div>
  </div>

  <div class="section-label">Assessments</div>

  <!-- Column headers -->
  <div class="col-headers">
    <div class="ch" style="width:52px;flex-shrink:0"></div>
    <div class="ch" style="flex:1">Score</div>
    <div class="ch" style="width:12px;flex-shrink:0"></div>
    <div class="ch" style="flex:1">Out of</div>
    <div class="ch" style="width:46px;flex-shrink:0">%</div>
    <div class="ch" style="width:12px;flex-shrink:0"></div>
    <div class="ch" style="width:52px;flex-shrink:0">Weight</div>
  </div>

  <div class="inputs-group">
    <div class="input-row">
      <div class="input-tag">RBA</div>
      <input type="number" id="rba_s" placeholder="score" min="0" oninput="updatePct('rba')">
      <div class="slash">/</div>
      <input type="number" id="rba_m" placeholder="max" min="1" oninput="updatePct('rba')">
      <div class="pct-display" id="rba_pct">—</div>
      <div class="x-sym">×</div>
      <input type="number" class="weight-input" id="w_rba" value="20" min="0" max="100" oninput="checkWeights()">
    </div>
    <div class="input-row">
      <div class="input-tag">Test 1</div>
      <input type="number" id="t1_s" placeholder="score" min="0" oninput="updatePct('t1')">
      <div class="slash">/</div>
      <input type="number" id="t1_m" placeholder="max" min="1" oninput="updatePct('t1')">
      <div class="pct-display" id="t1_pct">—</div>
      <div class="x-sym">×</div>
      <input type="number" class="weight-input" id="w_t1" value="40" min="0" max="100" oninput="checkWeights()">
    </div>
    <div class="input-row">
      <div class="input-tag">Test 2</div>
      <input type="number" id="t2_s" placeholder="score" min="0" oninput="updatePct('t2')">
      <div class="slash">/</div>
      <input type="number" id="t2_m" placeholder="max" min="1" oninput="updatePct('t2')">
      <div class="pct-display" id="t2_pct">—</div>
      <div class="x-sym">×</div>
      <input type="number" class="weight-input" id="w_t2" value="40" min="0" max="100" oninput="checkWeights()">
    </div>
  </div>
  <div class="weight-warn" id="weight_warn">Assessment weights must add up to 100%</div>

  <div class="divider"></div>

  <div class="target-row">
    <div class="target-label">Target overall %</div>
    <input type="number" id="target" class="target-input" placeholder="e.g. 75" min="0" max="100">
  </div>

  <button class="calc-btn" onclick="calculate()">Calculate →</button>

  <div class="result" id="result">
    <div class="result-score" id="score-display"></div>
    <div class="result-label">needed in the exam</div>
    <div class="result-note" id="result-note"></div>
    <div class="breakdown" id="breakdown"></div>
  </div>
</div>

<script>
function syncSplit(changed) {
  const a = document.getElementById('w_assess');
  const e = document.getElementById('w_exam');
  const warn = document.getElementById('split_warn');
  const av = parseFloat(a.value) || 0;
  const ev = parseFloat(e.value) || 0;
  if (changed === 'assess') e.value = Math.max(0, 100 - av);
  else a.value = Math.max(0, 100 - ev);
  const total = parseFloat(a.value) + parseFloat(e.value);
  warn.style.display = Math.abs(total - 100) > 0.01 ? 'inline' : 'none';
}

function checkWeights() {
  const w1 = parseFloat(document.getElementById('w_rba').value) || 0;
  const w2 = parseFloat(document.getElementById('w_t1').value) || 0;
  const w3 = parseFloat(document.getElementById('w_t2').value) || 0;
  const warn = document.getElementById('weight_warn');
  const total = w1 + w2 + w3;
  warn.style.display = Math.abs(total - 100) > 0.01 ? 'block' : 'none';
}

function updatePct(id) {
  const s = parseFloat(document.getElementById(id + '_s').value);
  const m = parseFloat(document.getElementById(id + '_m').value);
  const el = document.getElementById(id + '_pct');
  el.textContent = (!isNaN(s) && !isNaN(m) && m > 0) ? (s/m*100).toFixed(1)+'%' : '—';
}

function getPct(id) {
  const s = parseFloat(document.getElementById(id + '_s').value);
  const m = parseFloat(document.getElementById(id + '_m').value);
  if (isNaN(s) || isNaN(m) || m <= 0) return null;
  return (s / m) * 100;
}

function calculate() {
  const rba = getPct('rba');
  const t1  = getPct('t1');
  const t2  = getPct('t2');
  const tgt = parseFloat(document.getElementById('target').value);
  const resultBox = document.getElementById('result');

  if ([rba, t1, t2].some(v => v === null) || isNaN(tgt)) {
    resultBox.style.display = 'none'; return;
  }

  const wA  = (parseFloat(document.getElementById('w_assess').value) || 0) / 100;
  const wE  = (parseFloat(document.getElementById('w_exam').value)   || 0) / 100;
  const wR  = (parseFloat(document.getElementById('w_rba').value)    || 0) / 100;
  const wT1 = (parseFloat(document.getElementById('w_t1').value)     || 0) / 100;
  const wT2 = (parseFloat(document.getElementById('w_t2').value)     || 0) / 100;

  const assessTotal   = wR * rba + wT1 * t1 + wT2 * t2;
  const assessContrib = wA * assessTotal;
  const examNeeded    = wE > 0 ? (tgt - assessContrib) / wE : null;

  resultBox.style.display = 'block';
  resultBox.className = 'result';

  const scoreEl = document.getElementById('score-display');
  const noteEl  = document.getElementById('result-note');
  const breakEl = document.getElementById('breakdown');

  if (examNeeded === null) {
    scoreEl.textContent = 'N/A';
    resultBox.classList.add('bad');
    noteEl.textContent = "Exam weight is 0% — check your split.";
  } else if (examNeeded > 100) {
    scoreEl.textContent = '>100%';
    resultBox.classList.add('bad');
    noteEl.textContent = "Not achievable — lower your target.";
  } else if (examNeeded < 0) {
    scoreEl.textContent = '0%';
    resultBox.classList.add('good');
    noteEl.textContent = "Already hit your target — just show up!";
  } else {
    scoreEl.textContent = examNeeded.toFixed(1) + '%';
    if      (examNeeded <= 50) { resultBox.classList.add('good'); noteEl.textContent = "Very achievable. You're in a good spot."; }
    else if (examNeeded <= 75) { resultBox.classList.add('warn'); noteEl.textContent = "Doable, but study up."; }
    else                       { resultBox.classList.add('bad');  noteEl.textContent = "Tough ask — put in the hours."; }
  }

  breakEl.innerHTML = `
    <div>RBA <span>${rba.toFixed(1)}%</span> · T1 <span>${t1.toFixed(1)}%</span> · T2 <span>${t2.toFixed(1)}%</span></div>
    <div>Weighted assessment total &nbsp;<span>${assessTotal.toFixed(1)}%</span></div>
    <div>Assessment contribution (×${(wA*100).toFixed(0)}%) &nbsp;<span>${assessContrib.toFixed(1)} pts</span></div>
    <div>Exam needed &nbsp;<span>${examNeeded !== null ? Math.max(0,examNeeded).toFixed(1)+'%' : 'N/A'}</span></div>
  `;
}

document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
});
</script>
</body>
</html>
